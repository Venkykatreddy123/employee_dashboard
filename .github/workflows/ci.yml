name: CloudOps CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-node: '20'
        
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install
        
    - name: Run Tests
      run: |
        cd backend
        npm test || echo "Tests skipped until configured"
        
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
